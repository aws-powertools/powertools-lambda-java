# Check for Spotbug errors
#
# Description:
#   Runs Spotbugs for a pull request.
#   This does not error on failure yet, our rules are too strong and would fail on every run
# 
# Triggers:
#   - pull_request
on:
  pull_request:
    branches:
      - main
    paths:
      - 'powertools-batch/**'
      - 'powertools-core/**'
      - 'powertools-cloudformation/**'
      - 'powertools-common/**'
      - 'powertools-e2e-tests/**'
      - 'powertools-idempotency/**'
      - 'powertools-large-messages/**'
      - 'powertools-logging/**'
      - 'powertools-metrics/**'
      - 'powertools-kafka/**'
      - 'powertools-parameters/**'
      - 'powertools-serialization/**'
      - 'powertools-sqs/**'
      - 'powertools-tracing/**'
      - 'powertools-tracing/**'
      - 'powertools-validation/**'
      - 'powertools-test-suite/**'
      - 'powertools-lambda-metadata/**'
      - 'pom.xml'
      - '.github/workflows/**'

name: SpotBugs
run-name: SpotBugs 

permissions:
    contents: read

jobs:
  codecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'corretto'
          java-version: 21
      - name: Build with Maven for spotbugs check to mark build as fail if voilations found
        run: mvn -Pbuild-with-spotbugs -B install --file pom.xml -DskipTests -Dmaven.javadoc.skip=true -Dspotbugs.failOnError=true
