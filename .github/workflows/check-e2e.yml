# Run E2E tests for a branch
#
# Description: 
#   Runs E2E tests for a specified branch
#
# Triggers:
#   - push
#
# Secrets:
#   - E2E.AWS_IAM_ROLE

on:
  workflow_dispatch:

  push:
      branches:
        - main
      paths: # add other modules when there are under e2e tests
        - 'powertools-batch/**'
        - 'powertools-core/**'
        - 'powertools-cloudformation/**'
        - 'powertools-common/**'
        - 'powertools-e2e-tests/**'
        - 'powertools-idempotency/**'
        - 'powertools-large-messages/**'
        - 'powertools-logging/**'
        - 'powertools-metrics/**'
        - 'powertools-parameters/**'
        - 'powertools-serialization/**'
        - 'powertools-sqs/**'
        - 'powertools-tracing/**'
        - 'powertools-tracing/**'
        - 'powertools-validation/**'
        - 'pom.xml'

name: E2E Tests
run-name: E2E Tests - ${{ github.event_name }}

permissions:
  contents: read

jobs:
  e2e:
    name: E2E ${{ matrix.test-class }} (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: E2E
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        java:
          - 11
          - 17
          - 21
          - 25
        test-class:
          - BatchE2ET
          - IdempotencyE2ET
          - LargeMessageE2ET
          - LargeMessageIdempotentE2ET
          - LoggingE2ET
          - MetricsE2ET
          - ParametersE2ET
          - TracingE2ET
          - ValidationALBE2ET
          - ValidationApiGWE2ET
          
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'corretto'
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build all modules
        run: mvn -DskipTests -ntp install --file pom.xml
      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: us-east-1
      - name: Run e2e test with Maven
        env:
            JAVA_VERSION: ${{ matrix.java }}
        run: >
          mvn -Pe2e -B -ntp
          -Dit.test="${{ matrix.test-class }}"
          verify --file powertools-e2e-tests/pom.xml

  e2e-graal:  
    name: E2E GraalVM ${{ matrix.test-class }} (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: E2E
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        java:
          - 25
        test-class:
          - MetricsE2ET
          - LoggingE2ET
          - ParametersE2ET
          - TracingE2ET
          - IdempotencyE2ET
          
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'corretto'
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build all modules
        run: mvn -DskipTests -ntp install --file pom.xml
      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: us-east-1
      - name: Run e2e-graal test with Maven
        env:
            JAVA_VERSION: ${{ matrix.java }}
        run: >
          mvn -Pe2e-graal -B -ntp
          -Dit.test="${{ matrix.test-class }}"
          verify --file powertools-e2e-tests/pom.xml
